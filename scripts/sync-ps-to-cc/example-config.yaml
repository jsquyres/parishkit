common:
  dry_run: true

parishsoft:
  api_key_file: /opt/parishkit/credentials/parishsoft-api-key.txt
  cache_dir: /opt/parishkit/cache/parishsoft
  cache_limit: 14m
  expected_organization: Example Parish

constant_contact:
  client_id_file: /opt/parishkit/credentials/constant-contact-client.json
  access_token_file: /opt/parishkit/credentials/constant-contact-token.json

email:
  provider: google-workspace
  service_account_file: /opt/parishkit/credentials/google-service-account.json
  delegated_user: no-reply@example.org

sync_ps_to_cc:
  notifications:
    sender: no-reply@example.org
  lists:
    - source_workgroup: Example Newsletter Workgroup
      target_list: Example Newsletter
      notifications:
        - admin@example.org
  no_sync: false
  update_names: false
