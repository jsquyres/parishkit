common:
  dry_run: true

parishsoft:
  api_key_file: /opt/parishkit/credentials/parishsoft-api-key.txt
  cache_dir: /opt/parishkit/cache/parishsoft
  cache_limit: 14m
  expected_organization: Example Parish

google:
  service_account_file: /opt/parishkit/credentials/google-service-account.json
  delegated_subject: admin@example.org

create_ministry_rosters:
  spreadsheet_id: example-spreadsheet-id
  range: Roster!A1
  clear_range: Roster!A:Z
  workgroup_leader_suffix: " Ldr"
  ministries:
    - ministry: Example Ministry
      spreadsheet_id: example-ministry-spreadsheet-id
      include_birthday: false
      role_sheets:
        - name: Example Ministry Leaders
          roles:
            - Chairperson
            - Leader
          spreadsheet_id: example-role-spreadsheet-id
  workgroups:
    - workgroup: Example Workgroup
      spreadsheet_id: example-workgroup-spreadsheet-id
      include_birthday: false
